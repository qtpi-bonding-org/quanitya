# Quanitya Self-Hosted Production
# Usage: docker compose -f docker-compose.prod.yaml up -d

services:
  quanitya-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quanitya_server
    restart: unless-stopped
    env_file:
      - .env
      - .jwk
    environment:
      runmode: production
      serverid: default
      logging: normal
      role: monolith

      # Database
      SERVERPOD_DATABASE_HOST: postgres
      SERVERPOD_DATABASE_PORT: 5432
      SERVERPOD_DATABASE_NAME: quanitya
      SERVERPOD_DATABASE_USER: postgres
      SERVERPOD_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      SERVERPOD_DATABASE_REQUIRE_SSL: false

      # Redis
      SERVERPOD_REDIS_HOST: redis
      SERVERPOD_REDIS_PORT: 6379
      SERVERPOD_REDIS_ENABLED: true
      SERVERPOD_REDIS_REQUIRE_SSL: false
      SERVERPOD_PASSWORD_redis: ${REDIS_PASSWORD}

      # PowerSync JWT signing — POWERSYNC_JWT_PRIVATE_KEY_JWK loaded from .jwk via env_file
      POWERSYNC_URL: http://localhost:8095

      # SMTP (optional — without this, verification codes are logged to console)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_SSL: ${SMTP_SSL:-false}

      # R2 archival (optional)
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - quanitya_network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: quanitya_postgres
    restart: unless-stopped
    command: ["postgres", "-c", "wal_level=logical"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: quanitya
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quanitya_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quanitya_redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    networks:
      - quanitya_network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  powersync:
    image: journeyapps/powersync-service:latest
    container_name: quanitya_powersync
    restart: unless-stopped
    command: ["start", "-r", "unified"]
    ports:
      - "8095:8080"
    env_file:
      - .env
      - .jwk
    volumes:
      - ./powersync.yaml:/config/config.yaml:ro
    environment:
      POWERSYNC_CONFIG_PATH: /config/config.yaml
      PS_SOURCE_URI: "postgresql://powersync_role:${POSTGRES_PASSWORD}@postgres:5432/quanitya"
      PS_STORAGE_URI: "postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/powersync_storage"
      # PS_JWK_N, PS_JWK_E, PS_JWK_KID loaded from .jwk via env_file
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - quanitya_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  quanitya_network:
    driver: bridge
