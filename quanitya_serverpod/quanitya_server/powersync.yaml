# PowerSync Service Configuration for Quanitya Serverpod
# Syncs E2EE encrypted data and aesthetics between Flutter clients and PostgreSQL

# Replication configuration - defines the source database connection
replication:
  connections:
    - type: postgresql
      uri: !env PS_SOURCE_URI
      sslmode: disable

# Storage configuration - PowerSync internal storage
storage:
  type: postgresql
  uri: !env PS_STORAGE_URI
  sslmode: disable

# PowerSync API port (internal container port)
port: 8080

# Sync rules define which data should be synchronized to clients
# Uses authenticated JWT with user_id claim for multi-tenancy
sync_rules:
  config:
    edition: 2
    timestamps_iso8601: true
    timestamp_max_precision: microseconds
  content: |
    # Sync rules edition 2 format
    bucket_definitions:
      # Unified user-owned encrypted data bucket (E2EE)
      # Replaces individual buckets to improve replication reliability
      user_encrypted_data_v4:
        parameters:
          - SELECT request.user_id() AS user_id
        data:
          # Templates
          - SELECT id, "encryptedData" as encrypted_data, "updatedAt" as updated_at 
            FROM encrypted_templates 
            WHERE "accountUuid" = bucket.user_id
          # Log Entries (The main data bulk)
          - SELECT id, "encryptedData" as encrypted_data, "updatedAt" as updated_at 
            FROM encrypted_entries 
            WHERE "accountUuid" = bucket.user_id
          # Schedules
          - SELECT id, "encryptedData" as encrypted_data, "updatedAt" as updated_at 
            FROM encrypted_schedules 
            WHERE "accountUuid" = bucket.user_id
          # Analysis Scripts
          - SELECT id, "encryptedData" as encrypted_data, "updatedAt" as updated_at
            FROM encrypted_analysis_scripts
            WHERE "accountUuid" = bucket.user_id
          # Template Aesthetics (E2EE)
          - SELECT id, "encryptedData" as encrypted_data, "updatedAt" as updated_at
            FROM encrypted_template_aesthetics
            WHERE "accountUuid" = bucket.user_id

      # Greetings (Demo data)
      user_greetings:
        parameters:
          - SELECT request.user_id() AS user_id
        data:
          - SELECT * FROM greeting WHERE owner = bucket.user_id

      # Global bucket for broadcast notifications (syncs to ALL users)
      global_notifications:
        data:
          - SELECT id, title, message, type,
                   "createdAt" as created_at, "expiresAt" as expires_at,
                   "actionUrl" as action_url, "actionLabel" as action_label,
                   "markedAt" as marked_at, "updatedAt" as updated_at
            FROM notifications
            WHERE "accountUuid" IS NULL

      # User-specific bucket for individual notifications
      user_notifications:
        parameters:
          - SELECT request.user_id() AS user_id
        data:
          - SELECT id, title, message, type,
                   "createdAt" as created_at, "expiresAt" as expires_at,
                   "actionUrl" as action_url, "actionLabel" as action_label,
                   "markedAt" as marked_at, "updatedAt" as updated_at
            FROM notifications
            WHERE "accountUuid" = bucket.user_id

# Telemetry configuration
# Disable sharing of anonymized usage metrics with PowerSync
telemetry:
  disable_telemetry_sharing: true

# Client authentication configuration
# Using RSA JWT keys for authentication
client_auth:
  audience: ["powersync"]
  jwks:
    keys:
      - kty: RSA
        n: !env PS_JWK_N
        e: !env PS_JWK_E
        alg: RS256
        kid: !env PS_JWK_KID