# Quanitya Serverpod Passwords
# Copy to passwords.yaml: cp config/passwords.example.yaml config/passwords.yaml
# deploy.sh generates production values automatically — this is mainly for local dev/test.

production:
  database: your_secure_password_here
  redis: changeme
  serviceSecret: 'generated-by-deploy-sh'
  emailSecretHashPepper: 'generated-by-deploy-sh'
  jwtHmacSha512PrivateKey: 'generated-by-deploy-sh'
  jwtRefreshTokenHashPepper: 'generated-by-deploy-sh'

test:
  database: changeme
  redis: changeme
  serviceSecret: 'test-service-secret'
  emailSecretHashPepper: 'test-hash-pepper'
  jwtHmacSha512PrivateKey: 'test-jwt-hmac-key'
  jwtRefreshTokenHashPepper: 'test-refresh-pepper'
