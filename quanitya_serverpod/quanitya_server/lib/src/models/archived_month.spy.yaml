# ArchivedMonth: Container for archived data from a specific month
# Used by archive retrieval API to return historical data
class: ArchivedMonth
fields:
  # Account UUID who owns this archived data
  userId: String
  
  # Year of the archived month (e.g., 2024)
  year: int
  
  # Month of the archived data (1-12)
  month: int
  
  # Archived encrypted entries for this month
  entries: List<EncryptedEntry>
  
  # Archived encrypted templates for this month
  templates: List<EncryptedTemplate>
  
  # Archived encrypted schedules for this month
  schedules: List<EncryptedSchedule>
  
  # Archived encrypted analysis scripts for this month
  analysisScripts: List<EncryptedAnalysisScript>
  
  # When this data was archived to R2
  archivedAt: DateTime
  
  # Archive format version for future compatibility
  version: String