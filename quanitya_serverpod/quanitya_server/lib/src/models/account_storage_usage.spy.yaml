# AccountStorageUsage: per-account storage tracking
# Tracks bytes used across all encrypted tables. No quota enforcement —
# self-hosted users have unlimited storage.
class: AccountStorageUsage
table: account_storage_usage
fields:
  # Account UUID (one row per account, cross-database reference)
  accountUuid: String

  # Running total of LENGTH(encryptedData) across all encrypted tables
  bytesUsed: int

  # Total row count across all encrypted tables
  rowCount: int

  # Last time usage was updated
  updatedAt: DateTime, default=now
indexes:
  account_storage_usage_account_idx:
    fields: accountUuid
    unique: true
