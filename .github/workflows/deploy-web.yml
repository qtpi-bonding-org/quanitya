name: Deploy Flutter Web to Cloudflare Pages

on:
  push:
    branches: [ main, staging ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      project-name: ${{ steps.env.outputs.project-name }}
    steps:
      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
          elif [ "${{ github.ref }}" = "refs/heads/staging" ]; then
            ENV="staging"
          else
            ENV="staging"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT

          if [ "$ENV" = "production" ]; then
            echo "project-name=quanitya-flutter-web" >> $GITHUB_OUTPUT
          else
            echo "project-name=quanitya-flutter-web-staging" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: setup
    environment: ${{ needs.setup.outputs.environment }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.5'
        channel: 'stable'

    - name: Verify Environment Configuration
      run: |
        echo "Deploying to: ${{ needs.setup.outputs.environment }}"
        echo "Cloudflare Project: ${{ needs.setup.outputs.project-name }}"

        if [ -z "${{ secrets.CLOUDFLARE_QUANITYA_FLUTTER_WEB_API_TOKEN }}" ]; then
          echo "CLOUDFLARE_QUANITYA_FLUTTER_WEB_API_TOKEN secret is missing"
          exit 1
        fi
        if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
          echo "CLOUDFLARE_ACCOUNT_ID secret is missing"
          exit 1
        fi

        if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
          if [ -z "${{ secrets.PROD_SERVERPOD_URL }}" ]; then
            echo "PROD_SERVERPOD_URL secret is missing"
            exit 1
          fi
        else
          if [ -z "${{ secrets.STAGING_SERVERPOD_URL }}" ]; then
            echo "STAGING_SERVERPOD_URL secret is missing"
            exit 1
          fi
        fi

    - name: Build Flutter Web
      working-directory: quanitya_flutter
      run: |
        # Setup PowerSync web assets
        mkdir -p web
        curl -L -o web/sqlite3.wasm "https://github.com/powersync-ja/powersync.dart/releases/download/powersync-v1.17.0/sqlite3.wasm"
        curl -L -o web/powersync_db.worker.js "https://github.com/powersync-ja/powersync.dart/releases/download/powersync-v1.17.0/powersync_db.worker.js"

        if [ ! -f "web/sqlite3.wasm" ] || [ ! -f "web/powersync_db.worker.js" ]; then
          echo "Failed to download PowerSync web assets"
          exit 1
        fi

        flutter pub get

        flutter clean
        dart run build_runner clean
        dart run build_runner build --delete-conflicting-outputs

        # Set backend URLs based on environment
        if [ "${{ needs.setup.outputs.environment }}" = "production" ]; then
          SERVERPOD_URL="${{ secrets.PROD_SERVERPOD_URL }}"
        else
          SERVERPOD_URL="${{ secrets.STAGING_SERVERPOD_URL }}"
        fi

        flutter build web \
          --release \
          --base-href "/" \
          --source-maps \
          --no-tree-shake-icons \
          --dart-define=SERVERPOD_URL=$SERVERPOD_URL \
          --dart-define=GIT_COMMIT_HASH=${{ github.sha }}

        # Security headers for Cloudflare Pages (no leading whitespace!)
        cat > build/web/_headers << 'HEADERS'
/*
  Cross-Origin-Opener-Policy: same-origin
  Cross-Origin-Embedder-Policy: require-corp
  Cross-Origin-Resource-Policy: cross-origin
  Referrer-Policy: strict-origin-when-cross-origin
  X-Content-Type-Options: nosniff
  X-Frame-Options: DENY

/*.wasm
  Content-Type: application/wasm
  Cross-Origin-Resource-Policy: cross-origin
  Cache-Control: public, max-age=31536000, immutable

/*.js
  Cross-Origin-Resource-Policy: cross-origin
  Cache-Control: public, max-age=31536000, immutable

/flutter_service_worker.js
  Cache-Control: no-cache, no-store, must-revalidate

/main.dart.js
  Cross-Origin-Resource-Policy: cross-origin
HEADERS

    - name: Deploy to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CLOUDFLARE_QUANITYA_FLUTTER_WEB_API_TOKEN }}
        accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        projectName: ${{ needs.setup.outputs.project-name }}
        directory: quanitya_flutter/build/web

    - name: Deployment Summary
      run: |
        echo "Deployment completed: ${{ needs.setup.outputs.environment }}"
        echo "Project: ${{ needs.setup.outputs.project-name }}"
